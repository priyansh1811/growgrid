services:
  - type: web
    name: growgrid-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://growgrid-nine.vercel.app,https://growgrid.vercel.app
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: CROP_LLM_LAYER_ENABLED
        value: "true"
    healthCheckPath: /api/health
